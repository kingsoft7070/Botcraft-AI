name: Build Botcraft (Windows)

# 触发条件：推代码到main分支、创建PR时自动编译
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-2022  # 使用GitHub的Windows 2022虚拟机

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive  # 拉取子模块

    - name: Set up vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgDirectory: ${{ github.workspace }}/vcpkg
        vcpkgArguments: asio:x64-windows nlohmann-json:x64-windows openssl:x64-windows zlib:x64-windows
        vcpkgTriplet: x64-windows
        vcpkgGitCommitId: 2024.04.12  # 固定vcpkg版本，避免兼容问题

    - name: Configure CMake
      uses: lukka/run-cmake@v10
      with:
        cmakeListsTxtPath: ${{ github.workspace }}/CMakeLists.txt
        buildDirectory: ${{ github.workspace }}/build
        cmakeAppendedArgs: >
          -G "Visual Studio 17 2022"
          -A x64
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
          -DBOTCRAFT_BUILD_EXAMPLES=ON
          -DBOTCRAFT_USE_OPENGL_GUI=OFF
          -DBOTCRAFT_DOWNLOAD_DEPENDENCIES=OFF

    - name: Build
      working-directory: ${{ github.workspace }}/build
      run: msbuild Botcraft.sln /p:Configuration=Release /m:4

    - name: Upload compiled executable
      uses: actions/upload-artifact@v4
      with:
        name: ChatCommandExample-Windows
        path: ${{ github.workspace }}/build/examples/2_ChatCommandExample/Release/2_ChatCommandExample.exe
