name: Build Botcraft (Windows)

# 触发条件：推代码到main分支、创建PR时自动编译
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 环境变量统一管理
env:
  VERSION: 1.20.1
  BUILD_TYPE: Release
  CMAKE_GENERATOR: "Visual Studio 17 2022"

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      # 1. 拉取代码 + 递归拉取所有子模块（关键修复：下载3rdparty下的zlib/openssl等源码）
      - name: Checkout code (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive  # 递归拉取所有3rdparty子模块源码
          fetch-depth: 0         # 确保子模块能完整拉取

      # 2. CMake配置（保留你原有FORCE_LOCAL_*=ON的配置）
      - name: Pre_configure
        shell: cmd
        run: |
          cmake -G "%CMAKE_GENERATOR%" ^
            -A x64 ^  # 显式指定64位编译，匹配子模块源码的编译架构
            -DCMAKE_BUILD_TYPE=%BUILD_TYPE% ^
            -DBOTCRAFT_GAME_VERSION="%VERSION%" ^
            -DBOTCRAFT_USE_OPENGL_GUI=ON ^
            -DBOTCRAFT_USE_IMGUI=ON ^
            -DBOTCRAFT_COMPRESSION=ON ^
            -DBOTCRAFT_ENCRYPTION=ON ^
            -DBOTCRAFT_BUILD_EXAMPLES=ON ^  # 启用示例编译（你的ChatCommandExample）
            -DBOTCRAFT_BUILD_TESTS=ON ^
            -DBOTCRAFT_BUILD_TESTS_ONLINE=OFF ^
            -DBOTCRAFT_WINDOWS_BETTER_SLEEP=ON ^
            -DBOTCRAFT_FORCE_LOCAL_ZLIB=ON ^  # 保留ON，现在子模块已下载源码
            -DBOTCRAFT_FORCE_LOCAL_OPENSSL=ON ^
            -DBOTCRAFT_FORCE_LOCAL_GLFW=ON ^
            -DBOTCRAFT_FORCE_LOCAL_GLAD=ON ^
            -DBOTCRAFT_FORCE_LOCAL_CATCH=ON ^
            -DBOTCRAFT_INSTALL_MC_ASSETS=OFF ^
            -DBOTCRAFT_USE_PRECOMPILED_HEADERS=ON ^
            -DBOTCRAFT_BUILD_DOC=OFF ^
            -DBOTCRAFT_OUTPUT_DIR=output ^
            -DCMAKE_INSTALL_PREFIX=install/botcraft ^
            -S %GITHUB_WORKSPACE% ^
            -B .

      # 3. 编译代码（4线程加速）
      - name: Build
        run: cmake --build . --config %BUILD_TYPE% --parallel 4

      # 4. 上传编译产物（你的ChatCommandExample可执行文件）
      - name: Upload Windows Executable
        uses: actions/upload-artifact@v4
        with:
          name: ChatCommandExample-Win64
          path: ${{ github.workspace }}/output/Release/2_ChatCommandExample.exe
